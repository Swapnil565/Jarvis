apiVersion: v1
kind: Service
metadata:
  name: jarvis-api
spec:
  type: NodePort
  selector:
    app: jarvis-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-redis
spec:
  type: ClusterIP
  selector:
    app: jarvis-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
